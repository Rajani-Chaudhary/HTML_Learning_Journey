<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
        }
        td, th {
            border: 1px solid #111111;
            text-align: center;
            padding: 10px;
            color: rgb(48, 7, 150);
        }
        tr {
            background-color: rgb(232, 211, 198);
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Country </th>
            <th>Country code</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>India</td>
            <td>IN</td>
            <td>India@google.com</td>
        </tr>
        <tr>
            <td>United States of America </td>
            <td>USA</td>
            <td>usa@google.com</td>
        </tr>
        <tr>
            <td>Japan</td>
            <td>JP</td>
            <td>jp@google.com</td>
        </tr>
         <tr>
            <td>China</td>
            <td>CN</td>
            <td>cn@google.com</td>
        </tr>
    </table>
</body>
</html
